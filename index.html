// ─── Sound Engine ────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const g = ctx.createGain(); g.connect(ctx.destination);
    const o = ctx.createOscillator(); o.connect(g);
    if (type === "open") {
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.12);
      o.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.35);
      o.type = "sine"; o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.5);
    } else if (type === "tap") {
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      o.frequency.setValueAtTime(660, ctx.currentTime);
      o.type = "sine"; o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.12);
    } else if (type === "success") {
      [0, 0.1, 0.2].forEach((t, i) => {
        const o2 = ctx.createOscillator(); o2.connect(g);
        o2.frequency.setValueAtTime([523,659,784][i], ctx.currentTime + t);
        o2.type = "sine";
        g.gain.setValueAtTime(0.15, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
        o2.start(ctx.currentTime + t); o2.stop(ctx.currentTime + t + 0.18);
      });
    } else if (type === "delete") {
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      o.frequency.setValueAtTime(330, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.18);
      o.type = "sawtooth"; o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.18);
    } else if (type === "calc") {
      g.gain.setValueAtTime(0.08, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
      o.frequency.setValueAtTime(1100, ctx.currentTime);
      o.type = "sine"; o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.07);
    }
  } catch(e) {}
}

function computed() {
  const isUr = state.lang === "ur";
  const ff = isUr ? "'Noto Nastaliq Urdu',serif" : "'Inter',sans-serif";
  const dir = isUr ? "rtl" : "ltr";
  const lowItems = state.products.filter(p => p.stock <= state.thresh);

  const todayRev = state.sales.filter(s => new Date(s.date).toDateString() === new Date().toDateString()).reduce((a,s) => a+s.total, 0);
  const billTotal = state.billItems.reduce((s,i) => s+i.sell*i.qty, 0);
  const billBal = billTotal - (+state.paid||0);
  const pages = {home:isUr?state.shopName:"Bablo Shop",prods:isUr?"مصنوعات":"Products",bill:isUr?"بل بنائیں":"Billing",rep:isUr?"رپورٹ":"Reports",set:isUr?"ترتیبات":"Settings",stk:isUr?"اسٹاک":"Stock",sales2:isUr?"فروخت":"Sales",favs:isUr?"پسندیدہ":"Favorites"};
  return { isUr, ff, dir, lowItems, favItems, todayRev, billTotal, billBal, pages };
}

let toastTimer = null;
function showToast(msg, type="ok") {
  const T = getT();
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  el.style.background = T.isDark ? "rgba(8,16,32,0.96)" : "rgba(255,255,255,0.97)";
  el.style.border = `1px solid ${type==="ok"?"#10b981":type==="warn"?"#f59e0b":"#ef4444"}`;
  el.style.color = T.text;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = "none"; }, 2500);
}

function addBill(p) {
  playSound("tap");

  if (e) state.billItems = state.billItems.map(i => i.id===p.id ? {...i, qty:i.qty+1} : i);
  else state.billItems = [...state.billItems, {...p, qty:1}];
  showToast(`${gn(p,state.lang)} ✓`, "ok");

function finBill() {
  const { isUr, billTotal, billBal } = computed();
  if (!state.billItems.length) { showToast(isUr?"اشیاء شامل کریں":"Add items first","warn"); return; }
  const newBill = {id:Date.now(),billNo:`BS-${Date.now().toString().slice(-4)}`,customer:state.cname||"Walk-in",items:[...state.billItems],total:billTotal,paid:+state.paid||0,bal:billBal,date:new Date().toISOString()};
  state.bills = [newBill, ...state.bills];
  state.products = state.products.map(p => {
    const bi = state.billItems.find(i => i.id===p.id);
    return bi ? {...p, stock:Math.max(0,p.stock-bi.qty)} : p;
  });
  state.billItems.forEach(item => {
    state.sales = [{id:Date.now()+Math.random(),name:item.ur,nameEn:item.en,qty:item.qty,total:item.sell*item.qty,profit:(item.sell-item.buy)*item.qty,date:new Date().toISOString()}, ...state.sales];
  });
  playSound("success");
  state.billItems = []; state.cname = ""; state.paid = "";
  showToast(isUr?"بل مکمل ✓":"Bill done ✓","ok");
  save();
  state.showReceipt = newBill;
  render();
}
function doSale() {
  const { isUr } = computed();
  const p = state.products.find(x => x.id === +state.sPid);
  if (!p) { showToast(isUr?"مصنوع منتخب کریں":"Select product","warn"); return; }
  const pr = +state.sPrice || p.sell;
  state.sales = [{id:Date.now(),name:p.ur,nameEn:p.en,qty:+state.sQty,total:pr*state.sQty,profit:(pr-p.buy)*state.sQty,date:new Date().toISOString()}, ...state.sales];
  state.products = state.products.map(x => x.id===p.id ? {...x, stock:Math.max(0,x.stock-state.sQty)} : x);
  playSound("success"); showToast(`${gn(p,state.lang)} ✓`,"ok");
  state.sPid=""; state.sQty=1; state.sPrice="";
  save(); render();
}

// ─── Calculator ────────────────────────────────────────────────────────────
function calcPress(btn) {
  playSound("calc");
  if (btn==="C") { state.calcVal="0"; state.calcPrev=""; state.calcOp=null; state.calcNew=true; renderCalc(); return; }
  if (btn==="±") { state.calcVal=(+state.calcVal*-1).toString(); renderCalc(); return; }
  if (btn==="%") { state.calcVal=(+state.calcVal/100).toString(); renderCalc(); return; }
  if (["+","-","×","÷"].includes(btn)) { state.calcPrev=state.calcVal; state.calcOp=btn; state.calcNew=true; renderCalc(); return; }
  if (btn==="=") {
    if (!state.calcOp) return;
    const a=+state.calcPrev, b=+state.calcVal; let r=0;
    if(state.calcOp==="+") r=a+b; if(state.calcOp==="-") r=a-b;
    if(state.calcOp==="×") r=a*b; if(state.calcOp==="÷") r=b!==0?a/b:0;
    state.calcVal=parseFloat(r.toFixed(6)).toString();
    state.calcOp=null; state.calcPrev=""; state.calcNew=true; playSound("success"); renderCalc(); return;
  }
  if (btn===".") { if(!state.calcVal.includes(".")) state.calcVal+="."; renderCalc(); return; }
  if (state.calcNew) { state.calcVal=btn; state.calcNew=false; }
  else state.calcVal = state.calcVal==="0" ? btn : state.calcVal+btn;
  renderCalc();
}
function renderCalc() {
  const el = document.getElementById("calc-display");
  if (el) {
    document.getElementById("calc-prev").textContent = state.calcPrev + (state.calcOp?` ${state.calcOp}`:"");
    document.getElementById("calc-val").textContent = state.calcVal;
  }
}

// ─── Reports ───────────────────────────────────────────────────────────────
function getRSales() {
  return state.sales.filter(s => {
    const d=new Date(s.date), now=new Date();
    if(state.rTab==="daily") return d.toDateString()===now.toDateString();
    if(state.rTab==="weekly") return (now-d)/86400000<=7;
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
}
function getChartD() {
  const n=state.rTab==="monthly"?10:7; const map={};
  for(let i=n-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i);
    const k=state.rTab==="monthly"?d.getDate():["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()]; map[k]=0; }
  state.sales.forEach(s=>{ const d=new Date(s.date); if((new Date()-d)/86400000>n) return;
    const k=state.rTab==="monthly"?d.getDate():["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()];
    if(k in map) map[k]+=s.total; });
  return Object.entries(map);
}

  state.billItems = state.billItems.filter(x => x.id!==id);

function exportData() {
  const { isUr } = computed();
  const d = {products:state.products,sales:state.sales,bills:state.bills};
  const b = new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  const u = URL.createObjectURL(b);
  const a = document.createElement("a"); a.href=u; a.download="bablo-shop-data.json"; a.click();
  playSound("success"); showToast(isUr?"برآمد ✓":"Exported ✓","ok");
}
function resetData() {
  const { isUr } = computed();
  if (window.confirm(isUr?"تمام ڈیٹا صاف کریں؟":"Reset all data?")) {
    state.products=INIT_P; state.sales=[]; state.bills=[]; save(); playSound("delete"); showToast(isUr?"ری سیٹ ✓":"Reset ✓","ok"); render();
  }
}

function renderPage() {
  const T=getT(); const { isUr, ff, lowItems, pages } = computed();

  // Preserve scroll if same page
  const pc = document.getElementById("page-content");
  let html = "";
  if (state.page==="home") html = renderHome();
  else if (state.page==="prods") html = renderProds();
  else if (state.page==="sales2") html = renderSales();
  else if (state.page==="stk") html = renderStock();
  else if (state.page==="rep") html = renderReports();
  else if (state.page==="bill") html = renderBilling();
  else if (state.page==="favs") html = renderFavs();
  else if (state.page==="set") html = renderSettings();
  pc.innerHTML = html;
}

  const T=getT(); const { isUr, ff, dir, lowItems, pages } = computed();

  // Body / app background
  document.body.style.background = T.bg;
  document.body.style.color = T.text;
  document.getElementById("app").style.direction = dir;
  document.getElementById("app").style.fontFamily = ff;

  // Orbs
  document.getElementById("orb1").style.display = T.isDark ? "block" : "none";
  document.getElementById("orb2").style.display = T.isDark ? "block" : "none";

  // Topbar
  const topbar = document.getElementById("topbar");
  topbar.style.background = T.topbar;
  topbar.style.borderBottom = `1px solid ${T.topbarBorder}`;
  topbar.style.boxShadow = T.isDark ? "none" : "0 2px 16px rgba(59,130,246,0.08)";
  const tbBtnStyle = `background:${T.card};border:1px solid ${T.cardBorder};color:${T.text}`;
  document.getElementById("btn-drawer").style.cssText += `;${tbBtnStyle}`;
  document.getElementById("btn-theme").style.cssText += `;${tbBtnStyle}`;
  document.getElementById("btn-lang").style.cssText += `;${tbBtnStyle}`;
  document.getElementById("btn-calc").style.cssText += `;${tbBtnStyle}`;
  document.getElementById("btn-notif").style.cssText += `;${tbBtnStyle}`;
  document.getElementById("btn-theme").textContent = T.isDark ? "☀️" : "🌙";
  document.getElementById("btn-lang").textContent = state.lang==="ur"?"اُر":state.lang==="en"?"EN":"RO";
  document.getElementById("topbar-title").textContent = pages[state.page] || "بابلو شاپ";
  document.getElementById("topbar-title").style.color = T.text;
  document.getElementById("topbar-title").style.fontFamily = ff;
  const badge = document.getElementById("notif-badge");
  if (lowItems.length > 0) { badge.style.display="flex"; badge.textContent=lowItems.length; } else badge.style.display="none";

  // Drawer
  const drawer = document.getElementById("drawer");
  drawer.style.left = isUr ? "auto" : "0";
  drawer.style.right = isUr ? "0" : "auto";
  drawer.style.borderRadius = isUr ? "13px 0 0 13px" : "0 13px 13px 0";
  drawer.style.transform = state.drawer ? "none" : `translateX(${isUr?"100%":"-100%"})`;
  drawer.style.background = T.drawerBg;
  drawer.style.border = `1px solid ${T.cardBorder}`;
  drawer.style.direction = dir;
  document.getElementById("drawer-overlay").style.display = state.drawer ? "block" : "none";
  document.getElementById("drawer-header").style.borderBottom = `1px solid ${T.hdrLine}`;
  document.getElementById("drawer-shopname").textContent = state.shopName;
  document.getElementById("drawer-shopname").style.color = T.text;

  const navItems = [{pg:"home",icon:"📊",ur:"ڈیش بورڈ",en:"Dashboard"},{pg:"prods",icon:"📦",ur:"مصنوعات",en:"Products"},{pg:"sales2",icon:"💰",ur:"فروخت درج",en:"Record Sale"},{pg:"stk",icon:"📈",ur:"اسٹاک",en:"Stock"},{pg:"rep",icon:"📋",ur:"رپورٹ",en:"Reports"},{pg:"bill",icon:"🧾",ur:"بل بنائیں",en:"Billing"},{pg:"favs",icon:"❤️",ur:"پسندیدہ",en:"Favorites"},{pg:"set",icon:"⚙️",ur:"ترتیبات",en:"Settings"}];
  document.getElementById("drawer-nav").innerHTML = navItems.map(i=>`
    <div class="hv" onclick="nav('${i.pg}')" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;border-radius:9px;margin:2px 7px;background:${state.page===i.pg?`rgba(59,130,246,${T.isDark?"0.18":"0.12"})`:"transparent"};color:${state.page===i.pg?"#3b82f6":T.text};font-family:${ff};">
      <span>${i.icon}</span><span>${state.lang==="en"?i.en:i.ur}</span>
    </div>`).join("");

  // Bottom nav
  const bnav = document.getElementById("bottom-nav");
  bnav.style.background = T.navBg;
  bnav.style.borderTop = `1px solid ${T.topbarBorder}`;
  bnav.style.boxShadow = T.isDark ? "none" : "0 -2px 16px rgba(59,130,246,0.08)";
  const bnavItems = [{pg:"home",icon:"🏠",ur:"ہوم",en:"Home"},{pg:"prods",icon:"📦",ur:"اشیاء",en:"Items"},{pg:"bill",icon:"🧾",ur:"بل",en:"Bill"},{pg:"rep",icon:"📊",ur:"رپورٹ",en:"Report"},{pg:"set",icon:"⚙️",ur:"مزید",en:"More"}];
  bnav.innerHTML = bnavItems.map(n=>`
    <button class="nb" onclick="nav('${n.pg}')" style="color:${state.page===n.pg?"#3b82f6":T.text3};">
      <span style="font-size:18px;">${n.icon}</span>
      <span style="font-size:9px;font-family:${ff};">${state.lang==="en"?n.en:n.ur}</span>
    </button>`).join("");

  renderPage();
  renderModals();
}

// ─── Events ─────────────────────────────────────────────────────────────────
document.getElementById("btn-drawer").addEventListener("click", () => { playSound("tap"); state.drawer=!state.drawer; render(); });
document.getElementById("drawer-overlay").addEventListener("click", () => { state.drawer=false; render(); });
document.getElementById("btn-theme").addEventListener("click", () => { playSound("tap"); state.theme=state.theme==="dark"?"white":"dark"; save(); render(); });
document.getElementById("btn-lang").addEventListener("click", () => { playSound("tap"); state.lang=state.lang==="ur"?"en":state.lang==="en"?"roman":"ur"; save(); render(); });
document.getElementById("btn-calc").addEventListener("click", () => { playSound("tap"); state.showCalc=true; renderModals(); });
document.getElementById("btn-notif").addEventListener("click", () => { playSound("tap"); state.modal="notif"; renderModals(); });

// ─── PWA ─────────────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById("pwa-banner");
  banner.style.display = "flex";
});
document.getElementById("pwa-install-btn").addEventListener("click", () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt=null; document.getElementById("pwa-banner").style.display="none"; });
  }
});
document.getElementById("pwa-dismiss-btn").addEventListener("click", () => {
  document.getElementById("pwa-banner").style.display="none";
});
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
}

// ─── Splash & Boot ────────────────────────────────────────────────────────────
const splashDots = document.getElementById("splash-dots");
for (let i=0;i<3;i++) {
  const d=document.createElement("div");
  d.style.cssText=`width:8px;height:8px;border-radius:50%;background:#3b82f6;animation:pulse 1.2s ease ${i*0.2}s infinite`;
  splashDots.appendChild(d);
}
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";
  playSound("open");
  render();
}, 2000);
</script>
</body>
</html>
